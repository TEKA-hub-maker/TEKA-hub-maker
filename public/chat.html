<!DOCTYPE html>
<html>
<head>
  <title>Chat Room</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 50px auto; }
    #messages { 
      list-style: none; 
      padding: 10px; 
      height: 450px; 
      overflow-y: scroll; 
      border: 1px solid #ccc; 
      background: #f0f4f8; 
      border-radius: 8px;
    }
    #messages li { 
      padding: 8px 12px; 
      margin-bottom: 6px; 
      border-radius: 6px; 
      word-wrap: break-word;
    }
    #messages li:nth-child(odd) { background: #d0e7ff; }
    #messages li:nth-child(even) { background: #c8f0c8; }
    input, button { padding: 10px; margin: 5px; border-radius: 5px; }
    button { cursor: pointer; background: #007bff; color: white; border: none; }
    #image-form button { background: #ff5722; }
  </style>
</head>
<body>
  <h1>Chat Room: <span id="roomName"></span></h1>
  <a href="/rooms">Back to Rooms</a> | <a href="/logout">Logout</a>

  <ul id="messages"></ul>

  <!-- Image upload -->
  <form id="image-form" enctype="multipart/form-data">
    <input type="file" id="image" accept="image/*" />
    <button type="submit">Upload Image</button>
  </form>

  <!-- Chat message form -->
  <form id="chat-form">
    <input id="m" autocomplete="off" placeholder="Type a message… use emojis 🙂👍" />
    <button>Send</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const username = sessionStorage.getItem('username');
    const room = sessionStorage.getItem('room');
    if (!username || !room) window.location.href = '/';

    document.getElementById('roomName').textContent = room;

    const socket = io();
    socket.emit('join room', { username, room });

    const messages = document.getElementById('messages');
    const chatForm = document.getElementById('chat-form');
    const input = document.getElementById('m');

    chatForm.addEventListener('submit', function(e){
      e.preventDefault();
      if (input.value) {
        socket.emit('chat message', input.value);
        input.value = '';
      }
    });

    socket.on('chat message', function(msg){
      const li = document.createElement('li');
      li.innerHTML = `[${msg.time}] <b>${msg.user}:</b> ${msg.text}`;
      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    });

    // Image upload
    const imageForm = document.getElementById('image-form');
    const imageInput = document.getElementById('image');

    imageForm.addEventListener('submit', function(e){
      e.preventDefault();
      if (!imageInput.files[0]) return;

      const formData = new FormData();
      formData.append('image', imageInput.files[0]);
      formData.append('username', username);
      formData.append('room', room);

      fetch('/upload', { method: 'POST', body: formData })
        .then(() => { imageInput.value = ''; });
    });
  </script>
</body>
</html>
